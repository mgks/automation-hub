<div class="page-content">
    <div class="workflow-header" style="margin-bottom: 2rem;">
        <h1 style="font-size: 2.2rem; margin-bottom: 0.5rem;">{{title}}</h1>
        <div class="pills-container">{{pills}}</div>
    </div>

    <div class="workflow-main-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
        <div class="workflow-left-column">
            <!-- NEW: Description Section -->
            <div class="workflow-description card" style="height: 100%;">
                <h3 style="margin-top:0; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">About this automation</h3>
                <p style="font-size: 1.05rem; line-height: 1.7; color: var(--subtle-text-color);">{{description}}</p>
            </div>
        </div>
        
        <div class="workflow-right-column">
            {{usageInstructions}}
        </div>
    </div>

    <div class="actions-container" style="justify-content: center; padding-top: 3rem;">
        {{actions}}
        <div class="share-container" id="shareContainer">
            <button class="button button-secondary" id="share-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-share2-icon lucide-share-2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"></line><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"></line></svg>
                <span id="share-button-text">Share</span>
            </button>
            <div class="share-options" id="share-options">
                <a id="share-twitter" href="#" target="_blank" class="icon-button" title="Share on Twitter">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-twitter-icon lucide-twitter"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
                </a>
                <a id="share-linkedin" href="#" target="_blank" class="icon-button" title="Share on LinkedIn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-linkedin-icon lucide-linkedin"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
                </a>
                <button id="copy-link-button" class="icon-button" title="Copy link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-copy-icon lucide-copy"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                </button>
            </div>
        </div>
    </div>
    <!-- NEW: Related Workflows Section for SEO -->
    <div class="related-workflows-container">
        <h3>More Automations for You</h3>
        <div class="related-grid">
            {{relatedWorkflows}}
        </div>
    </div>
</div>

<div class="homepage-content">
    <div class="intro-section">
        <h2>Automation Hub</h2>
        <p>
            The universal, searchable, and hosted directory for automation workflows across <strong>n8n</strong>, <strong>OpenClaw</strong>, and more. 
            Discover thousands of community-sourced automations in one place.
        </p>
    </div>

    <div class="stats-bar">
        <span><strong>{{workflow_count}}</strong> Workflows</span>
        <span>•</span>
        <span><strong>{{tool_count}}</strong> Tools</span>
        <span>•</span>
        <span>Updated Daily</span>
    </div>

    <div class="browse-section" id="browseSection">
        <h3>Browse by Tool</h3>
        <div class="tools-container" id="toolsContainer">
            {{tools}}
        </div>
    </div>

    {{showcases}}
</div>
